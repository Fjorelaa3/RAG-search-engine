services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./articles.db:/app/articles.db
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
